<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente Bancario</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #f1f3f6;
    margin: 0;
    display: flex;
    justify-content: center;
    height: 100vh;
  }
  .chat-container {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    background: #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }
  header {
    background: #0a2342;
    color: white;
    padding: 16px 20px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  header button:hover { background: rgba(255,255,255,0.35); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
    font-size: 14.5px;
  }
  .user {
    align-self: flex-end;
    background: #1a73c4;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: #eceff3;
    color: #222;
    border-bottom-left-radius: 4px;
  }
  .bot.loading { color: #999; font-style: italic; }
  form {
    display: flex;
    border-top: 1px solid #e3e6ea;
    padding: 12px;
    gap: 8px;
  }
  input[type=text] {
    flex: 1;
    border: 1px solid #d8dce1;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14.5px;
    outline: none;
  }
  input[type=text]:focus { border-color: #1a73c4; }
  button[type=submit] {
    background: #1a73c4;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14.5px;
    cursor: pointer;
  }
  button[type=submit]:hover { background: #0a2342; }
</style>
</head>
<body>
  <div class="chat-container">
    <header>
      <span>Asistente Bancario</span>
      <button id="reset-btn">Nueva conversacion</button>
    </header>
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="input" placeholder="Escribi tu mensaje..." autocomplete="off" autofocus>
      <button type="submit">Enviar</button>
    </form>
  </div>

<script>
const messagesEl = document.getElementById("messages");
const form = document.getElementById("chat-form");
const input = document.getElementById("input");
const resetBtn = document.getElementById("reset-btn");

function addMessage(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  input.value = "";

  const bubble = addMessage("", "bot loading");
  let fullText = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) {
      const data = await res.json();
      bubble.classList.remove("loading");
      bubble.textContent = "Error: " + (data.error || res.statusText);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop(); // ultimo fragmento puede estar incompleto, se completa en el proximo chunk

      for (const event of events) {
        if (!event.startsWith("data:")) continue;
        const payload = JSON.parse(event.slice(5).trim());

        if (payload.error) {
          bubble.classList.remove("loading");
          bubble.textContent = (fullText ? fullText + "\n" : "") + "Error: " + payload.error;
          continue;
        }
        if (payload.done) continue;

        if (payload.token) {
          bubble.classList.remove("loading");
          fullText += payload.token;
          bubble.textContent = fullText;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    }
  } catch (err) {
    bubble.classList.remove("loading");
    bubble.textContent = (fullText ? fullText + "\n" : "") + "Error de conexion: " + err.message;
  }
});

resetBtn.addEventListener("click", async () => {
  await fetch("/api/reset", { method: "POST" });
  messagesEl.innerHTML = "";
});
</script>
</body>
</html>
